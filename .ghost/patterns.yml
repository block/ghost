composition_patterns:
  - id: preview-code-split
    title: preview-code-split
    surface_types:
      - ai-element-demo
      - component-catalogue
      - primitive-demo
    frequency: 3
    confidence: 0.38
    anatomy:
      ordered:
        - component-page-shell
        - source-snippet
        - code-tabs
        - demo-grid
        - display-header
        - interactive-demo
        - metadata-rail
        - preview-frame
        - sidebar
        - variant-examples
        - variant-list
    traits:
      density:
        - standard
      layout_shape:
        - control-surface
        - tracker
      dominant_components:
        - Accordion
        - Agent
        - Button
        - Card
        - CodeBlock
        - Input
        - Sidebar
        - Tabs
      source_signal:
        - preview-code-split
    evidence:
      - surface_id: 3ef2b46784c9f5c7
        locator: /ui/components
        path: apps/docs/src/app/ui/components/page.tsx
      - surface_id: 0bb1b078b4d715c4
        locator: /ui/components/agent
        path: apps/docs/src/components/docs/ai-elements/index.tsx
      - surface_id: bc0df98e421cb69c
