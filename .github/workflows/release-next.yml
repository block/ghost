name: Release (next)

# Unofficial snapshot channel. Publishes @design-intelligence/ghost to the npm
# `next` dist-tag with an ephemeral version so changes can be smoke-tested via
# `npm install @design-intelligence/ghost@next` before a stable release.
#
# This never touches `latest`, opens a version PR, cuts a GitHub Release, or
# updates Homebrew. Those belong to release.yml on main.

on:
  push:
    branches: [next]
  workflow_dispatch:

concurrency:
  group: release-next-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  snapshot:
    name: Publish next snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f39d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @design-intelligence/ghost build

      # Snapshot mode rewrites the version in this CI checkout only. Publishing
      # under `next` leaves the stable version line and `latest` dist-tag alone.
      - name: Disable changelog for snapshot
        run: |
          node -e '
            const fs = require("node:fs");
            const p = ".changeset/config.json";
            const cfg = JSON.parse(fs.readFileSync(p, "utf8"));
            cfg.changelog = false;
            fs.writeFileSync(p, JSON.stringify(cfg, null, 2) + "\n");
          '

      - name: Version snapshot
        run: pnpm changeset version --snapshot next

      - name: Publish to next tag
        run: pnpm changeset publish --tag next --no-git-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.DESIGN_INTELLIGENCE_NPM_PUBLISH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.DESIGN_INTELLIGENCE_NPM_PUBLISH_TOKEN }}
