name: Release (next)

# Unofficial snapshot channel. Publishes @anarchitecture/ghost to the npm
# `next` dist-tag with an ephemeral version (0.0.0-next-<sha>) so stacked PRs
# landed on an integration branch can be smoke-tested via
# `npm install @anarchitecture/ghost@next` before a real release off main.
#
# This NEVER touches the `latest` tag, never opens a version PR, never cuts a
# GitHub Release or bumps the Homebrew tap. Those belong to release.yml.

on:
  push:
    branches: [next]
  workflow_dispatch:

concurrency:
  group: release-next-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  snapshot:
    name: Publish next snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @anarchitecture/ghost build

      # Snapshot mode rewrites the version to 0.0.0-next-<timestamp>-<sha> in
      # memory for this run only; we never commit it. `changeset publish` then
      # ships it under the `next` dist-tag and skips git tagging so the stable
      # semver line on main is untouched.
      # Snapshot versions are ephemeral, so a GitHub-linked changelog is just
      # ceremony — and changelog-github hammers the GraphQL API across the
      # whole stack, which is flaky. Disable changelog generation for this run
      # only. This edits the CI working copy and is never committed, so the
      # stable changelog config on main is untouched.
      - name: Disable changelog for snapshot
        run: |
          node -e '
            const fs = require("node:fs");
            const p = ".changeset/config.json";
            const cfg = JSON.parse(fs.readFileSync(p, "utf8"));
            cfg.changelog = false;
            fs.writeFileSync(p, JSON.stringify(cfg, null, 2) + "\n");
          '

      - name: Version snapshot
        run: pnpm changeset version --snapshot next

      - name: Publish to next tag
        run: pnpm changeset publish --tag next --no-git-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GHOST_NPM_PUBLISH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GHOST_NPM_PUBLISH_TOKEN }}
