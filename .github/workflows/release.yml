name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @anarchitecture/ghost build

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          publish: node scripts/publish-ghost-package.mjs
          version: pnpm changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GHOST_NPM_PUBLISH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GHOST_NPM_PUBLISH_TOKEN }}

      - name: Sync GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f .release-published.json ]; then
            echo "No publish marker found; skipping GitHub Release sync."
            exit 0
          fi

          PACKAGE_NAME="$(node -e "const fs=require('fs'); const marker=JSON.parse(fs.readFileSync('.release-published.json','utf8')); console.log(marker.name)")"
          VERSION="$(node -e "const fs=require('fs'); const marker=JSON.parse(fs.readFileSync('.release-published.json','utf8')); console.log(marker.version)")"

          if [ "$PACKAGE_NAME" != "@anarchitecture/ghost" ]; then
            echo "Unexpected release marker package: $PACKAGE_NAME"
            exit 1
          fi

          TAG="anarchitecture-ghost@${VERSION}"
          mkdir -p dist-tarball
          pnpm --filter @anarchitecture/ghost pack --pack-destination "$GITHUB_WORKSPACE/dist-tarball"
          ls -la dist-tarball
          ASSET="dist-tarball/anarchitecture-ghost-${VERSION}.tgz"
          if [ ! -f "$ASSET" ]; then
            echo "Expected packed asset missing: $ASSET"
            exit 1
          fi

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --target "$GITHUB_SHA" --generate-notes "$ASSET"
          else
            gh release edit "$TAG" --title "$TAG" --target "$GITHUB_SHA"
            gh release upload "$TAG" "$ASSET" --clobber
          fi
