name: Deploy to GitHub Pages

# Builds apps/catalogue with DEPLOY_BASE=/ghost/ and uploads the dist as
# the Pages artifact. The catalogue is the single deployed site — it owns
# all routes including drift docs (/tools/drift/*).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build @ghost/ui library
        run: pnpm --filter @ghost/ui build:lib

      - name: Build shadcn registry
        run: pnpm --filter @ghost/ui build:registry

      - name: Build catalogue (base=/ghost/)
        env:
          DEPLOY_BASE: /ghost/
        run: pnpm --filter @ghost/catalogue build

      - name: SPA fallback
        run: cp apps/catalogue/dist/index.html apps/catalogue/dist/404.html

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: apps/catalogue/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
